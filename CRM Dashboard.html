<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NexusCRM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: oklch(0.965 0.008 240); min-height: 100vh; }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: oklch(0.80 0.03 270); border-radius: 10px; }
    input, select, button { font-family: 'Plus Jakarta Sans', sans-serif; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes modalFadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes modalSlideIn { from { opacity: 0; transform: scale(0.94) translateY(12px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    @keyframes spin { to { transform: rotate(360deg); } }
    .view-enter { animation: fadeIn 0.22s ease forwards; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="Modal.jsx"></script>
<script type="text/babel" src="Sidebar.jsx"></script>
<script type="text/babel" src="Dashboard.jsx"></script>
<script type="text/babel" src="Clientes.jsx"></script>
<script type="text/babel" src="Pipeline.jsx"></script>
<script type="text/babel" src="Calendario.jsx"></script>
<script type="text/babel" src="Trabajos.jsx"></script>
<script type="text/babel" src="Telegram.jsx"></script>
<script type="text/babel" src="Ajustes.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "#78bf5a",
  "sidebarCollapsed": false,
  "compactMode": false,
  "showWelcome": true
}/*EDITMODE-END*/;

function TopBar({ view, collapsed, onToggle, tweaks }) {
  const labels = { dashboard: 'Dashboard', clientes: 'Clientes', pipeline: 'Pipeline', calendario: 'Calendario', trabajos: 'Trabajos', telegram: 'Telegram Chat', ajustes: 'Ajustes' };
  return (
    <div style={{
      height: 56, background: 'white', borderBottom: '1px solid oklch(0.93 0.01 270)',
      display: 'flex', alignItems: 'center', padding: '0 24px', gap: 14,
      boxShadow: '0 1px 0 oklch(0.93 0.01 270)',
    }}>
      <button onClick={onToggle} style={{ width: 32, height: 32, border: 'none', background: 'oklch(0.95 0.01 270)', borderRadius: 8, cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'oklch(0.40 0.04 270)', flexShrink: 0 }}>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <span style={{ fontSize: 15, fontWeight: 700, color: 'oklch(0.18 0.03 270)' }}>{labels[view]}</span>
      <div style={{ marginLeft: 'auto', display: 'flex', alignItems: 'center', gap: 10 }}>
        {/* Search */}
        <div style={{ position: 'relative' }}>
          <svg style={{ position: 'absolute', left: 10, top: '50%', transform: 'translateY(-50%)', color: 'oklch(0.65 0.04 270)' }} width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input placeholder="Buscar..." style={{ padding: '7px 12px 7px 30px', borderRadius: 8, border: '1px solid oklch(0.90 0.02 270)', fontSize: 12, outline: 'none', background: 'oklch(0.97 0.01 270)', width: 180, color: 'oklch(0.30 0.03 270)', fontFamily: 'inherit' }}/>
        </div>
        {/* Notif */}
        <button style={{ width: 34, height: 34, border: '1px solid oklch(0.90 0.02 270)', borderRadius: 8, background: 'white', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'oklch(0.45 0.04 270)', position: 'relative' }}>
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <div style={{ position: 'absolute', top: 6, right: 6, width: 7, height: 7, borderRadius: '50%', background: 'oklch(0.62 0.18 25)', border: '1.5px solid white' }}/>
        </button>
        {/* Avatar */}
        <div style={{ width: 34, height: 34, borderRadius: '50%', background: 'linear-gradient(135deg, oklch(0.62 0.18 25), oklch(0.68 0.16 50))', display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'white', fontWeight: 700, fontSize: 12, cursor: 'pointer' }}>JR</div>
      </div>
    </div>
  );
}

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [view, setView] = React.useState('dashboard');
  const [collapsed, setCollapsed] = React.useState(tweaks?.sidebarCollapsed ?? false);
  const [viewKey, setViewKey] = React.useState(0);

  const navigate = (v) => { setView(v); setViewKey(k => k + 1); };
  const toggleSidebar = () => { setCollapsed(c => { setTweak('sidebarCollapsed', !c); return !c; }); };

  const views = {
    dashboard: DashboardView,
    clientes: ClientesView,
    pipeline: PipelineView,
    calendario: CalendarioView,
    trabajos: TrabajosView,
    telegram: TelegramView,
    ajustes: AjustesView,
  };
  const ViewComponent = views[view];

  return (
    <div style={{ display: 'flex', height: '100vh', overflow: 'hidden' }}>
      <Sidebar active={view} onNav={navigate} collapsed={collapsed}/>
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
        <TopBar view={view} collapsed={collapsed} onToggle={toggleSidebar} tweaks={tweaks}/>
        <main style={{
          flex: 1, overflowY: 'auto', padding: tweaks?.compactMode ? '16px 20px' : '24px 28px',
          background: 'oklch(0.965 0.008 240)',
        }}>
          <div key={viewKey} className="view-enter">
            <ViewComponent/>
          </div>
        </main>
      </div>
      <TweaksPanel>
        <TweakSection title="Navegación">
          <TweakToggle label="Sidebar colapsado" value={collapsed} onChange={v => { setCollapsed(v); setTweak('sidebarCollapsed', v); }}/>
          <TweakToggle label="Modo compacto" value={tweaks?.compactMode} onChange={v => setTweak('compactMode', v)}/>
        </TweakSection>
        <TweakSection title="Vista rápida">
          <TweakRadio label="Sección" value={view} options={['dashboard','clientes','pipeline','calendario','trabajos','telegram','ajustes']} onChange={v => navigate(v)}/>
        </TweakSection>
        <TweakSection title="Acento">
          <TweakColor label="Color primario" value="#7c5cbf" onChange={v => setTweak('accentColor', v)}/>
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
